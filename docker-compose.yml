services:
  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    container_name: maintenance-cmms-backend
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      DataProvider__Provider: PostgreSql
      DataProvider__ExcelPath: /app/data/excel
      DataProvider__SqlServerConnectionString: ""
      DataProvider__PostgreSqlConnectionString: Host=postgres;Port=5432;Database=${POSTGRES_DB:-cmms};Username=${POSTGRES_APP_USER:-cmms_app};Password=${POSTGRES_APP_PASSWORD:-cmms_app_password}
      Database__SeedDevelopment: "true"
      DataProviders__Excel__BasePath: /app/data/excel
      Jwt__Issuer: MaintenanceCMMS
      Jwt__Audience: MaintenanceCMMS.Clients
      Jwt__Secret: dev-local-maintenance-cmms-jwt-secret-change-me-2026
      Jwt__ExpirationMinutes: 60
      Auth__SeedAdmin__Username: admin
      Auth__SeedAdmin__Email: admin@example.local
      Auth__SeedAdmin__DisplayName: Administrador CMMS
      Auth__SeedAdmin__Password: ChangeMe.Admin123!
      SharePoint__Provider: LocalSimulation
      SharePoint__LocalPath: /app/data/sharepoint-simulated
      SharePoint__ManualRootUrl: ""
      SharePoint__SiteUrl: ""
      SharePoint__TenantId: ""
      SharePoint__ClientId: ""
      SharePoint__SiteId: ""
      SharePoint__DriveId: ""
      Mail__Provider: Mailhog
      Mail__From: cmms@example.local
      Mail__PlanningEmail: planificacion@example.local
      Mail__Host: mailhog
      Mail__Port: 1025
      Pdf__TemplatePath: /app/data/templates
      Imports__StoragePath: /app/data/imports
    volumes:
      - ./data/excel:/app/data/excel:ro
      - ./data/imports:/app/data/imports
      - ./data/templates:/app/data/templates
      - ./data/sharepoint-simulated:/app/data/sharepoint-simulated
    ports:
      - "5041:8080"
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: maintenance-cmms-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cmms}
      POSTGRES_USER: ${POSTGRES_APP_USER:-cmms_app}
      POSTGRES_PASSWORD: ${POSTGRES_APP_PASSWORD:-cmms_app_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_APP_USER:-cmms_app} -d ${POSTGRES_DB:-cmms}"]
      interval: 5s
      timeout: 5s
      retries: 20

  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
    container_name: maintenance-cmms-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: maintenance-cmms-nginx
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - backend
      - frontend

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: maintenance-cmms-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres-data:
